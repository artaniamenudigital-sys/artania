  // ================== FUNCIÓN DE SUBIDA A CLOUDINARY ==================
  async function uploadToCloudinary(fileInputId, targetUrlId, previewId) {
    const fileInput = document.getElementById(fileInputId);
    const file = fileInput.files[0];
    if (!file) {
      toast("Selecciona una imagen primero");
      return;
    }
    // Vista previa local
    const reader = new FileReader();
    reader.onload = function(e) {
      const preview = document.getElementById(previewId);
      if (preview) {
        preview.src = e.target.result;
        preview.style.display = 'block';
      }
    };
    reader.readAsDataURL(file);

    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);

    try {
      toast('Subiendo imagen a Cloudinary...');
      const response = await fetch(
        `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`,
        { method: 'POST', body: formData }
      );
      const result = await response.json();
      if (result.secure_url) {
        document.getElementById(targetUrlId).value = result.secure_url;
        toast('✅ Imagen subida correctamente a Cloudinary');
      } else {
        throw new Error('No se recibió URL de Cloudinary');
      }
    } catch (error) {
      console.error(error);
      toast('❌ Error al subir a Cloudinary. Verifica tu cloud name y upload preset.');
    }
  }

  function initCanvas() {
    let c = document.getElementById('inkCanvas');
    let ctx = c.getContext('2d');
    let W, H, drops = [];
    function resize() { W = c.width = window.innerWidth; H = c.height = window.innerHeight; }
    resize(); window.addEventListener('resize', resize);
    function spawn() {
      drops.push({
        x: Math.random() * W, y: Math.random() * H * 0.5, r: Math.random() * 2 + 0.5,
        vy: Math.random() * 0.3 + 0.1, life: 0, maxLife: Math.random() * 200 + 100,
        color: Math.random() > 0.7 ? 'rgba(196,30,58,' : 'rgba(245,240,235,'
      });
    }
    for (let i = 0; i < 40; i++) spawn();
    function tick() {
      ctx.clearRect(0, 0, W, H);
      drops.forEach((d, i) => {
        let p = d.life / d.maxLife;
        let op = p < 0.3 ? p / 0.3 : (1 - p) * 1.2;
        ctx.beginPath();
        ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
        ctx.fillStyle = d.color + Math.min(op, 0.55) + ')';
        ctx.fill();
        d.y += d.vy;
        d.life++;
        if (d.life >= d.maxLife) { drops.splice(i, 1); spawn(); }
      });
      requestAnimationFrame(tick);
    }
    tick();
  }
